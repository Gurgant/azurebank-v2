name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  backend:
    name: Backend build + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: backend
        run: dotnet restore AzureBank.slnx

      - name: Build
        working-directory: backend
        run: dotnet build AzureBank.slnx --no-restore --configuration Release

      # No DB or secrets needed: the test fixture runs on the EF InMemory
      # provider and supplies its own test-only JWT secret. The 14 skipped
      # tests are the explicit SQL-Server-only ones.
      - name: Test
        working-directory: backend
        run: >
          dotnet test tests/AzureBank.Tests/AzureBank.Tests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"

      # BFF gateway integration tests (edge rate limiter, ADR-0013). InMemory /
      # no DB or backend needed — the limiter rejects before the proxy runs.
      - name: Test BFF
        working-directory: backend
        run: >
          dotnet test tests/AzureBank.Bff.Tests/AzureBank.Bff.Tests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=bff-test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            backend/tests/AzureBank.Tests/TestResults/
            backend/tests/AzureBank.Bff.Tests/TestResults/

  # The idempotency single-execution guarantee and the balance optimistic-
  # concurrency retry depend on REAL SQL Server semantics (unique-key races,
  # concurrency tokens, transactions); the InMemory provider only
  # approximates them. This job runs exactly those proofs against a mssql
  # container (Category=SqlServer trait; they self-skip elsewhere).
  backend-sql:
    name: Backend concurrency proofs (SQL Server)
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          # CI-only throwaway credentials; the database lives only for this job.
          SA_PASSWORD: YourStrong@Passw0rd123
          ACCEPT_EULA: Y
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd123 -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: backend
        run: dotnet restore AzureBank.slnx

      - name: Build
        working-directory: backend
        run: dotnet build AzureBank.slnx --no-restore --configuration Release

      - name: Concurrency proofs on SQL Server
        working-directory: backend
        env:
          AZUREBANK_TEST_SQLSERVER: "Server=localhost,1433;Database=AzureBankProofs;User Id=sa;Password=YourStrong@Passw0rd123;TrustServerCertificate=true"
        run: >
          dotnet test tests/AzureBank.Tests/AzureBank.Tests.csproj
          --no-build --configuration Release
          --filter "Category=SqlServer"
          --logger "trx;LogFileName=sql-test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-sql-test-results
          path: backend/tests/AzureBank.Tests/TestResults/

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Format check
        working-directory: frontend
        run: npm run format:check

      - name: API schema up to date
        working-directory: frontend
        # The FE↔BE contract gate: regenerate schema.d.ts from the committed OpenAPI spec
        # and fail if it differs from what's checked in — spec drift becomes a red build,
        # never a runtime surprise.
        run: |
          npm run generate:api
          git diff --exit-code src/api/schema.d.ts

      - name: Zod schemas up to date
        working-directory: frontend
        # Same gate for the RUNTIME validators: the spec-generated Zod schemas must match
        # the committed spec, so the strict money-response parsing can never drift silently.
        run: |
          npm run generate:zod
          git diff --exit-code src/api/generated/apiSchemas.ts

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build (tsc + vite)
        working-directory: frontend
        run: npm run build
