name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  backend:
    name: Backend build + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: backend
        run: dotnet restore AzureBank.slnx

      - name: Build
        working-directory: backend
        run: dotnet build AzureBank.slnx --no-restore --configuration Release

      # No DB or secrets needed: the test fixture runs on the EF InMemory
      # provider and supplies its own test-only JWT secret. The 14 skipped
      # tests are the explicit SQL-Server-only ones.
      - name: Test
        working-directory: backend
        run: >
          dotnet test tests/AzureBank.Tests/AzureBank.Tests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/tests/AzureBank.Tests/TestResults/

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build (tsc + vite)
        working-directory: frontend
        run: npm run build
